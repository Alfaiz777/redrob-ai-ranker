ai_usage_summary: |
  I read the JD and redrob_signals_doc carefully before writing any code and
  built a personal analysis (analysis/jd_notes.md) identifying the key signals,
  why availability should multiply rather than add, and which profiles to
  disqualify. The overall approach — 4-step pipeline, signal priority order,
  penalty design — came out of that reading and thinking process.

  Claude Code was used as a development partner throughout: helping implement
  the scoring modules based on the architecture I had in mind, debugging the
  parallel processing for performance, and reviewing signal logic. For the
  React dashboard, Claude handled most of the frontend component and layout
  code while I directed the data structure and what to display.

  No candidate profile data was passed to any LLM during the ranking step.
  The reproduce_command makes zero external API calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Evidence-based multi-signal ranking engine. No LLM calls or GPU during scoring.

  Four-step pipeline: (1) Hard disqualify — filters ~40K non-technical candidates
  instantly by title and career-text signals. (2) Base score — 11 specialist
  engines score each candidate against career_text (headline + summary + job
  descriptions — NOT the skills list, to avoid keyword stuffing). Signals cover:
  career evidence buckets (retrieval, ranking, search, embeddings, evaluation),
  title coherence, product company bonus, advanced LTR signals (XGBoost,
  offline-online correlation), career trajectory, skill credibility, location,
  industry, and evidence density (built/shipped/scaled vs passive mentions).
  (3) Behavioral multiplier — availability signals (open-to-work, response rate,
  notice period, interview completion, offer acceptance) multiply the base score,
  as the JD explicitly requires. (4) Penalties — consulting-only career, keyword
  stuffing, LLM-only profiles, pure research, wrong AI domain (CV/speech) each
  subtract fixed points after multiplication.

  Formula: total_score = (base_score x availability_mult) - penalties.
  Ranking is fully deterministic; ties broken by candidate_id ascending.
  Runtime: ~25 seconds on 8-core CPU via file-slice multiprocessing.

